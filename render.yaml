services:
  - type: web
    name: aryan-attendance-backend
    env: node
    plan: free
    buildCommand: npm install --prefix backend && npm run build --prefix backend
    startCommand: npm run start --prefix backend
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
        description: "Optional: MongoDB connection string (e.g. mongodb+srv://...). If not provided, fallback to JSON local files is used."
