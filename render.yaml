services:
  - type: web
    name: aryan-attendance-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
        description: "Optional: MongoDB connection string (e.g. mongodb+srv://...). If not provided, fallback to JSON local files is used."
